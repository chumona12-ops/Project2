<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>长颈鹿可滚动展示</title>
<style>
  /* 1. 页面全屏居中 */
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center; 
    align-items: center;     
    background-color: #fdf2f8; 
  }

  /* 2. 卡片容器：设置固定高度并允许滚动 */
  .giraffe-card {
    background: #ffffff;
    width: 350px;        /* 适中的卡片宽度 */
    height: 80vh;       /* 限制高度为屏幕高度的 80% */
    padding: 20px;
    border-radius: 40px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    
    /* 核心修改：开启垂直滚动 */
    overflow-y: auto;
    overflow-x: hidden;
    
    /* 让内容在容器内依然居中 */
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* 自定义滚动条样式（让它看起来更精致，不僵硬） */
  .giraffe-card::-webkit-scrollbar {
    width: 6px;
  }
  .giraffe-card::-webkit-scrollbar-thumb {
    background-color: #f48fb1; /* 粉色滚动条 */
    border-radius: 10px;
  }

  /* 3. 长颈鹿系统 */
  .giraffe-container {
    display: flex;
    flex-direction: column;
    width: 300px; /* 图片显示的宽度 */
  }

  /* 基础重置 */
  details, summary, div, img {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    display: block;
  }

  details summary {
    list-style: none;
    cursor: pointer;
    outline: none;
    transition: transform 0.2s ease;
  }
  details summary::-webkit-details-marker {
    display: none;
  }

  /* Hover 放大提示 */
  details summary:hover {
    transform: scale(1.05);
  }

  /* 图片基础样式 */
  .giraffe-part {
    width: 100%;
    height: auto;
  }

  /* 4. 展开逻辑 */
  .neck-wrap {
    display: none;
  }

  details[open] .neck-wrap {
    display: block;
  }
.floating-home-btn {
    position: fixed;    /* 固定定位，不随滚动条滚动 */
    top: 20px;          /* 距离顶部 20px */
    right: 20px;        /* 距离右侧 20px */
    z-index: 9999;      /* 确保按钮在所有元素的最上方 */
    cursor: pointer;    /* 鼠标悬停时显示手型 */
    transition: transform 0.2s ease; /* 增加点击动画效果 */
}

.floating-home-btn img {
    width: 50px;        /* 你可以根据需要调整按钮的大小 */
    height: 50px;
    display: block;
}

/* 鼠标悬停时的微调效果 */
.floating-home-btn:hover {
    transform: scale(1.1); /* 略微放大，增加交互感 */
    opacity: 0.8;          /* 略微透明 */
}
</style>
</head>
<body>

<div class="giraffe-card">
  <div class="giraffe-container">
    <details>
      <summary title="点击展开/收起脖子">
        <img src="head.png" alt="Head" class="giraffe-part">
      </summary>
      <div class="neck-wrap">
        <img src="neck.png" alt="Neck1" class="giraffe-part">
        <img src="neck.png" alt="Neck2" class="giraffe-part">
      </div>
    </details>

    <div class="body-wrap">
      <img src="body.png" alt="Body" class="giraffe-part">
    </div>
  </div>
</div>
<a href="index.html" class="floating-home-btn">
    <img src="cancel.png" alt="back">
</a>
</body>
</html>

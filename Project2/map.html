<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* 1. 页面全屏居中 */
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center; 
    align-items: center;     
    background-color: #fdf2f8; /* 页面大背景粉色 */
  }

  /* 2. 卡片容器：去掉滚动，尺寸适中 */
  .carpet-card {
    background: #ffffff;
    width: 400px;        /* 宽度缩小一点，显得更精致 */
    padding: 20px;
    border-radius: 35px;
    box-shadow: 0 15px 40px rgba(244, 143, 177, 0.2);
    /* 移除滚动条相关设置，让它直接撑开 */
  }

  /* 3. 地图系统布局 */
  .carpet-system {
    display: flex;
    flex-direction: column;
    width: 100%; 
  }

  /* 基础重置：消除所有边距和默认样式 */
  details, summary, div, img {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    display: block;
  }

  /* 隐藏默认箭头 */
  details summary {
    list-style: none;
    cursor: pointer;
    outline: none;
    transition: transform 0.2s ease;
  }
  details summary::-webkit-details-marker {
    display: none;
  }

  /* 4. 悬停提示：轻微放大 */
  details summary:hover {
    transform: scale(1.04);
  }

  /* 5. 粉色滤镜：应用给所有地图图片，确保展开前后色调统一 */
  .pink-filter {
    /* 混合滤镜：让图片呈现柔和的粉紫色调 */
    filter: sepia(0.4) hue-rotate(285deg) brightness(1.05) saturate(1.3);
    width: 100%;
    height: auto;
    border-radius: 10px; /* 图片边缘加一点圆角更柔和 */
  }
  details[open] .carpet-content-wrap {
    display: block;
  }
  .floating-home-btn {
    position: fixed;    /* 固定定位，不随滚动条滚动 */
    top: 20px;          /* 距离顶部 20px */
    right: 20px;        /* 距离右侧 20px */
    z-index: 9999;      /* 确保按钮在所有元素的最上方 */
    cursor: pointer;    /* 鼠标悬停时显示手型 */
    transition: transform 0.2s ease; /* 增加点击动画效果 */
}

.floating-home-btn img {
    width: 50px;        /* 你可以根据需要调整按钮的大小 */
    height: 50px;
    display: block;
}

/* 鼠标悬停时的微调效果 */
.floating-home-btn:hover {
    transform: scale(1.1); /* 略微放大，增加交互感 */
    opacity: 0.8;          /* 略微透明 */
}
</style>
</head>
<body>

<div class="carpet-card">
  <div class="carpet-system">
    <details class="carpet-toggle">
      <summary title="点击展开/卷起粉色地图">
        <img src="map2.png" alt="Rolled Map" class="pink-filter">
      </summary>
      
      <div class="carpet-content-wrap">
        <img src="map.png" alt="Map Body" class="pink-filter">
      </div>
    </details>
  </div>
</div>
<a href="homepage.html" class="floating-home-btn">
    <img src="cancel.png" alt="back">
</a>
</body>
</html>

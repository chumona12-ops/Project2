<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Studio Homepage</title>
    <style>
        /* --- 1. 全屏背景与基础设置 --- */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .homepage-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('background.png'); /* 确保文件名正确 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* --- 2. 场景中的 Label 标签样式 --- */
        .label-tag {
            position: absolute;
            padding: 6px 15px;
            background: rgba(230, 230, 230, 0.9);
            color: #d64a64;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            white-space: nowrap;
            z-index: 10;
        }

        .label-tag:hover {
            background: #ffffff;
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        /* 标签坐标定位 */
        .tag-window   { top: 28%; left: 33%; }
        .tag-class    { top: 25%; left: 55%; }
        .tag-giraffe  { top: 52%; left: 32%; }
        .tag-letter   { top: 48%; left: 48%; }
        .tag-ball     { top: 60%; left: 39%; }
        .tag-lamp     { top: 38%; left: 42%; }
        .tag-book     { top: 42%; left: 53%; }
        .tag-menu     { top: 51%; left: 56%; }
        .tag-list     { top: 43%; left: 78%; }
        .tag-brush    { top: 72%; left: 25%; }
        .tag-carpet   { top: 75%; left: 48%; }

        /* --- 3. 侧边栏触发按钮 (图1) --- */
        .menu-icon {
            position: fixed;
            top: 25px;
            left: 25px;
            cursor: pointer;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .menu-icon span {
            display: block;
            width: 38px;
            height: 10px;
            background-color: #ffdada; /* 粉色圆柱 */
            border-radius: 10px;
            transition: 0.3s ease;
        }

        .menu-icon:hover span {
            background-color: #ffb6b6;
        }

        /* --- 4. 侧边栏容器 (图2) --- */
        .sidebar {
            height: 100%;
            width: 320px;
            position: fixed;
            top: 0;
            left: -320px; /* 初始隐藏 */
            background-color: #b5838d; /* 藕粉色背景 */
            color: #000;
            overflow-y: auto;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding-top: 80px;
            z-index: 1000;
            box-shadow: 5px 0 15px rgba(0,0,0,0.2);
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar h2 {
            padding: 0 40px;
            font-size: 2.8rem;
            margin-top: 0;
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* --- 5. 折叠菜单样式 (Details/Summary) --- */
        .category {
            margin-bottom: 20px;
            padding: 0 40px;
            outline: none;
        }

        .category-title {
            font-size: 1.6rem;
            font-weight: 600;
            cursor: pointer;
            list-style: none; /* 隐藏默认箭头 */
            display: block;
            transition: color 0.3s;
        }

        /* 隐藏 Safari 的默认箭头 */
        .category-title::-webkit-details-marker {
            display: none;
        }

        /* 鼠标悬停在大标题上 */
        .category-title:hover {
            color: #fff;
        }

        /* 列表容器 */
        .details-list {
            list-style: none;
            padding: 10px 0 0 15px; /* 向右缩进 */
            margin: 0;
        }

        .details-list li {
            margin-bottom: 10px;
        }

        .details-list a {
            text-decoration: none;
            color: rgba(0, 0, 0, 0.65);
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .details-list a:hover {
            color: #fff;
            padding-left: 8px;
        }

        /* 遮罩层 */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 999;
        }
        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>

    <div class="homepage-container">
        <a href="window.html" class="label-tag tag-window">Window</a>
        <a href="class-schedual.html" class="label-tag tag-class">Class-schedual</a>
        <a href="giraffe.html" class="label-tag tag-giraffe">Giraffe</a>
        <a href="letter.html" class="label-tag tag-letter">Letter</a>
        <a href="ball.html" class="label-tag tag-ball">Ball</a>
        <a href="light.html" class="label-tag tag-lamp">Lamp</a>
        <a href="bookshelf.html" class="label-tag tag-book">Bookshelf</a>
        <a href="todolist.html" class="label-tag tag-list">to do list</a>
        <a href="menu.html" class="label-tag tag-menu">what to eat</a>
        <a href="brush.html" class="label-tag tag-brush">Brush</a>
        <a href="map.html" class="label-tag tag-carpet">Carpet</a>
    </div>

    <div class="menu-icon" onclick="toggleSidebar()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <nav class="sidebar" id="sidebar">
        <h2>Contents</h2>

        <details class="category" open>
            <summary class="category-title">Attitude</summary>
            <ul class="details-list">
                <li><a href="light.html">Lamp</a></li>
            </ul>
        </details>

        <details class="category">
            <summary class="category-title">Shape</summary>
            <ul class="details-list">
                <li><a href="window.html">Window</a></li>
                <li><a href="giraffe.html">Giraffe</a></li>
                <li><a href="brush.html">Brush</a></li>
                <li><a href="ball.html">Ball</a></li>
                <li><a href="carpet.html">Carpet</a></li>
            </ul>
        </details>

        <details class="category">
            <summary class="category-title">Structure</summary>
            <ul class="details-list">
                <li><a href="menu.html">what to eat</a></li>
                <li><a href="class-schedual.html">class-schedule</a></li>
                <li><a href="todolist.html">to-do list</a></li>
            </ul>
        </details>

        <details class="category">
            <summary class="category-title">Function</summary>
            <ul class="details-list">
                <li><a href="letter.html">Letter</a></li>
                <li><a href="booklet.html">Booklet</a></li>
            </ul>
        </details>
    </nav>

    <script>
        // 控制侧边栏和遮罩层的开关
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }
    </script>
</body>
</html>

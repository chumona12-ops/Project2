<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* 1. 页面全屏居中 */
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center; 
    align-items: center;     
    background-color: #fdf2f8; 
  }

  /* 2. 卡片容器 */
  .ball-card {
    background: #ffffff;
    width: 90%;          
    max-width: 600px;    
    padding: 30px;       
    border-radius: 40px; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.08); 
  }

  /* 3. Details 重置 */
  .ball-toggle summary {
    list-style: none;
    cursor: pointer;
    outline: none;
    user-select: none;
    /* 核心：为放大效果设置过渡时间 */
    transition: transform 0.3s ease;
  }
  .ball-toggle summary::-webkit-details-marker {
    display: none;
  }

  /* 鼠标靠近（Hover）时放大 */
  .ball-toggle summary:hover {
    transform: scale(1.03); /* 放大 3% */
  }

  /* 点击时的反馈：轻微缩小 */
  .ball-toggle summary:active {
    transform: scale(0.98);
  }

  /* 图片通用样式 */
  .ball-asset {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 0px; 
  }
 
  .ball-toggle[open] .ball-content-wrap {
    display: block;
  }
  .floating-home-btn {
    position: fixed;    /* 固定定位，不随滚动条滚动 */
    top: 20px;          /* 距离顶部 20px */
    right: 20px;        /* 距离右侧 20px */
    z-index: 9999;      /* 确保按钮在所有元素的最上方 */
    cursor: pointer;    /* 鼠标悬停时显示手型 */
    transition: transform 0.2s ease; /* 增加点击动画效果 */
}

.floating-home-btn img {
    width: 50px;        /* 你可以根据需要调整按钮的大小 */
    height: 50px;
    display: block;
}

/* 鼠标悬停时的微调效果 */
.floating-home-btn:hover {
    transform: scale(1.1); /* 略微放大，增加交互感 */
    opacity: 0.8;          /* 略微透明 */
}

</style>
</head>
<body>

<div class="ball-card">
  <details class="ball-toggle">
    <summary title="点击查看详情">
      <img src="ball.png" alt="Main Ball" class="ball-asset">
    </summary>
    
    <div class="ball-content-wrap">
      <img src="bounding.png" alt="Ball Part 1" class="ball-asset">
      <img src="bounding2.png" alt="Ball Part 2" class="ball-asset">
    </div>
  </details>
</div>
<a href="index.html" class="floating-home-btn">
    <img src="cancel.png" alt="back">
</a>
</body>
</html>

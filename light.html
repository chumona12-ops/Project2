<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灯开关模拟</title>
    <style>
        :root {
            --bg-color: #350208;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        /* 容器：建立相对定位基准 */
        .lamp-wrapper {
            position: relative;
            width: 80%;
            max-width: 800px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            line-height: 0; /* 消除图片下方间隙 */
        }

        /* 主图片：填满容器 */
        .lamp-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            transition: filter 0.3s;
        }

        /* 透明按钮：覆盖在红色开关位置，并添加闪烁动画 */
        .switch-hotspot {
            position: absolute;
            
            /* 坐标位置 */
            left: 52.5%;   
            top: 81%;     
            width: 6%;    
            height: 8%;   
            
            cursor: pointer;
            border-radius: 50%; /* 圆形点击区域 */
            z-index: 10;
            
            /* 绑定闪烁动画：2秒为一个周期，无限循环 */
            animation: pulse-hint 2s infinite ease-in-out;
        }

        /* 定义呼吸灯闪烁动画 */
        @keyframes pulse-hint {
            0% {
                background-color: rgba(255, 255, 255, 0.1);
                box-shadow: 0 0 0px rgba(255, 255, 255, 0);
            }
            50% {
                /* 中间状态：稍微变亮并带有微弱发光 */
                background-color: rgba(255, 255, 255, 0.4);
                box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            }
            100% {
                background-color: rgba(255, 255, 255, 0.1);
                box-shadow: 0 0 0px rgba(255, 255, 255, 0);
            }
        }

        /* 鼠标悬停时的反馈：停止动画并保持高亮 */
        .switch-hotspot:hover {
            animation: none;
            background-color: rgba(255, 255, 255, 0.556);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }
        .floating-home-btn {
    position: fixed;    /* 固定定位，不随滚动条滚动 */
    top: 20px;          /* 距离顶部 20px */
    right: 20px;        /* 距离右侧 20px */
    z-index: 9999;      /* 确保按钮在所有元素的最上方 */
    cursor: pointer;    /* 鼠标悬停时显示手型 */
    transition: transform 0.2s ease; /* 增加点击动画效果 */
}

.floating-home-btn img {
    width: 50px;        /* 你可以根据需要调整按钮的大小 */
    height: 50px;
    display: block;
}

/* 鼠标悬停时的微调效果 */
.floating-home-btn:hover {
    transform: scale(1.1); /* 略微放大，增加交互感 */
    opacity: 0.8;          /* 略微透明 */
}
    </style>
</head>
<body>

    <div class="lamp-wrapper">
        <img id="lamp" src="light2.png" alt="台灯" class="lamp-img">
        
        <div class="switch-hotspot" id="btn" title="点击开关灯"></div>
    </div>

    <script>
        const lamp = document.getElementById('lamp');
        const btn = document.getElementById('btn');

        // 定义图片路径
        const imgOff = "light2.png"; // 关灯图
        const imgOn = "light.png";   // 开灯图

        let isOn = false;

        btn.addEventListener('click', () => {
            if (!isOn) {
                lamp.src = imgOn;
                isOn = true;
            } else {
                lamp.src = imgOff;
                isOn = false;
            }
        });
    </script>
<a href="homepage.html" class="floating-home-btn">
    <img src="cancel.png" alt="back">
</a>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* 1. 页面全屏居中 */
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center; 
    align-items: center;     
    background-color: #fdf2f8; 
  }

  /* 2. 卡片容器：宽度设为 800px 以容纳横向排列 */
  .brush-card {
    background: #ffffff;
    width: 60%;          
    max-width: 600px;    
    padding: 30px;       
    border-radius: 40px; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
  }

  /* 3. Details 基础样式 */
  .brush-toggle summary {
    list-style: none;
    cursor: pointer;
    outline: none;
    transition: transform 0.2s ease;
  }
  .brush-toggle summary::-webkit-details-marker {
    display: none;
  }
  .brush-toggle summary:hover {
    transform: scale(1.05); /* 靠近时放大提示 */
  }

  .brush-asset {
    display: block;
    width: 100%;
    height: auto;
  }

  /* 4. 核心布局：第一层展开后，内部容器设为横向 Flex */
  .main-content-wrap {
    display: none;
    margin-top: 25px;
    /* 关键：让三个子笔刷并排 */
    flex-direction: row; 
    justify-content: space-around;
    gap: 20px;
  }

  /* 当最外层打开时，激活 Flex 布局 */
  .main-toggle[open] > .main-content-wrap {
    display: flex; 
  }

  /* 5. 子笔刷单元：限制宽度，防止并排时太大 */
  .sub-brush-item {
    flex: 1; /* 平分宽度 */
    max-width: 180px; 
    position: relative;
  }

  /* 子笔刷展开后的内容（水滴）依然竖直排列 */
  .sub-content-wrap {
    display: none;
    margin-top: 1px;
  }
  
  .sub-brush-item[open] .sub-content-wrap {
    display: block;
  }
  .floating-home-btn {
    position: fixed;    /* 固定定位，不随滚动条滚动 */
    top: 20px;          /* 距离顶部 20px */
    right: 20px;        /* 距离右侧 20px */
    z-index: 9999;      /* 确保按钮在所有元素的最上方 */
    cursor: pointer;    /* 鼠标悬停时显示手型 */
    transition: transform 0.2s ease; /* 增加点击动画效果 */
}

.floating-home-btn img {
    width: 50px;        /* 你可以根据需要调整按钮的大小 */
    height: 50px;
    display: block;
}

/* 鼠标悬停时的微调效果 */
.floating-home-btn:hover {
    transform: scale(1.1); /* 略微放大，增加交互感 */
    opacity: 0.8;          /* 略微透明 */
}

</style>
</head>
<body>

<div class="brush-card">
  <details class="brush-toggle main-toggle">
    <summary>
      <img src="brush.png" alt="Main Brush" class="brush-asset">
    </summary>
    
    <div class="main-content-wrap">
      
      <details class="brush-toggle sub-brush-item">
        <summary>
          <img src="brush2.png" alt="Brush 1" class="brush-asset">
        </summary>
        <div class="sub-content-wrap">
          <img src="waterdrop1.png" alt="W1" class="brush-asset waterdrop">
          <img src="water2.png" alt="W2" class="brush-asset waterdrop">
          <img src="water3.png" alt="W3" class="brush-asset waterdrop">
        </div>
      </details>

      <details class="brush-toggle sub-brush-item">
        <summary>
          <img src="brush2.png" alt="Brush 2" class="brush-asset">
        </summary>
        <div class="sub-content-wrap">
          <img src="waterdrop1.png" alt="W1" class="brush-asset waterdrop">
          <img src="water2.png" alt="W2" class="brush-asset waterdrop">
          <img src="water3.png" alt="W3" class="brush-asset waterdrop">
        </div>
      </details>

      <details class="brush-toggle sub-brush-item">
        <summary>
          <img src="brush2.png" alt="Brush 3" class="brush-asset">
        </summary>
        <div class="sub-content-wrap">
          <img src="waterdrop1.png" alt="W1" class="brush-asset waterdrop">
          <img src="water2.png" alt="W2" class="brush-asset waterdrop">
          <img src="water3.png" alt="W3" class="brush-asset waterdrop">
        </div>
      </details>

    </div>
  </details>
</div>
<a href="index.html" class="floating-home-btn">
    <img src="cancel.png" alt="back">
</a>
</body>
</html>

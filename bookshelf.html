<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粉色四大名著书架</title>
    <style>
        :root {
            --bg-light-pink: #ffe4e6; 
            --book-dark-pink: #f48fb1; 
            --text-dark: #880e4f;      
        }

        body {
            background-color: #fdf2f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: "STSong", "SimSun", "Microsoft YaHei", serif; /* 换成宋体更有书卷气 */
        }

        .bookshelf {
            background-color: var(--bg-light-pink);
            padding: 60px 50px;
            display: flex;
            gap: 20px; 
            border-radius: 24px;
            /* 给书架本身也加一个柔和的沉降阴影 */
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05), 0 20px 40px rgba(244, 143, 177, 0.25);
        }

        .book-item {
            width: 85px;
            position: relative;
        }

        summary {
            list-style: none;
            outline: none;
        }
        summary::-webkit-details-marker {
            display: none;
        }

        /* 书脊样式优化 */
        .book-spine {
            /* 使用渐变色模拟书脊的圆弧光泽 */
            background: linear-gradient(90deg, 
                rgba(255,255,255,0.3) 0%, 
                rgba(255,255,255,0) 10%, 
                var(--book-dark-pink) 15%, 
                var(--book-dark-pink) 100%);
            background-color: var(--book-dark-pink);
            
            height: 300px; 
            border-radius: 8px 15px 15px 8px; /* 左侧稍方，右侧稍圆 */
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            
            /* 核心修改：多层柔和阴影 */
            box-shadow: 
                2px 0 5px rgba(0,0,0,0.05),   /* 侧边微弱投影 */
                5px 5px 15px rgba(0,0,0,0.1); /* 整体悬浮感 */
        }

        .book-title {
            writing-mode: vertical-rl;
            text-orientation: upright;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 8px;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.15);
        }

        /* 悬停时的立体感增强 */
        .book-spine:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 
                0 15px 30px rgba(240, 98, 146, 0.4),
                0 5px 10px rgba(0,0,0,0.1);
            filter: brightness(1.05);
        }

        /* 详情卡片样式 */
        .book-content {
            background-color: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 16px;
            font-size: 0.95rem;
            color: var(--text-dark);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            
            position: absolute;
            width: 200px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            
            /* 简单的滑入效果 */
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translate(-50%, -10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        .book-content strong {
            display: block;
            font-size: 1.2rem;
            color: #ad1457;
            margin-bottom: 10px;
            text-align: center;
        }

        .info-tag {
            font-size: 0.75rem;
            background: var(--bg-light-pink);
            color: #ad1457;
            padding: 2px 8px;
            border-radius: 20px;
            margin-right: 8px;
            font-weight: bold;
        }
        .floating-home-btn {
    position: fixed;    /* 固定定位，不随滚动条滚动 */
    top: 20px;          /* 距离顶部 20px */
    right: 20px;        /* 距离右侧 20px */
    z-index: 9999;      /* 确保按钮在所有元素的最上方 */
    cursor: pointer;    /* 鼠标悬停时显示手型 */
    transition: transform 0.2s ease; /* 增加点击动画效果 */
}

.floating-home-btn img {
    width: 50px;        /* 你可以根据需要调整按钮的大小 */
    height: 50px;
    display: block;
}

/* 鼠标悬停时的微调效果 */
.floating-home-btn:hover {
    transform: scale(1.1); /* 略微放大，增加交互感 */
    opacity: 0.8;          /* 略微透明 */
}
    </style>
</head>
<body>

    <div class="bookshelf">
        <details class="book-item">
            <summary>
                <div class="book-spine">
                    <span class="book-title">西游记</span>
                </div>
            </summary>
            <div class="book-content">
                <strong>《西游记》</strong>
                <p><span class="info-tag">作者</span>吴承恩</p>
                <p><span class="info-tag">时期</span>明代</p>
                <p>简介：讲述了师徒四人历经九九八十一难去往西天取经的神魔冒险故事。</p>
            </div>
        </details>

        <details class="book-item">
            <summary>
                <div class="book-spine">
                    <span class="book-title">水浒传</span>
                </div>
            </summary>
            <div class="book-content">
                <strong>《水浒传》</strong>
                <p><span class="info-tag">作者</span>施耐庵</p>
                <p><span class="info-tag">时期</span>元末明初</p>
                <p>简介：描写了以宋江为首的一百零八位好汉在梁山聚义、反抗压迫的壮烈篇章。</p>
            </div>
        </details>

        <details class="book-item">
            <summary>
                <div class="book-spine">
                    <span class="book-title">三国演义</span>
                </div>
            </summary>
            <div class="book-content">
                <strong>《三国演义》</strong>
                <p><span class="info-tag">作者</span>罗贯中</p>
                <p><span class="info-tag">时期</span>元末明初</p>
                <p>简介：波澜壮阔的历史长卷，讲述了东汉末年魏、蜀、吴三国之间的政治军事斗争。</p>
            </div>
        </details>

        <details class="book-item">
            <summary>
                <div class="book-spine">
                    <span class="book-title">红楼梦</span>
                </div>
            </summary>
            <div class="book-content">
                <strong>《红楼梦》</strong>
                <p><span class="info-tag">作者</span>曹雪芹</p>
                <p><span class="info-tag">时期</span>清代</p>
                <p>简介：中国古典小说的巅峰之作，通过贾宝玉与林黛玉的爱情悲剧，展现了封建家族的兴衰。</p>
            </div>
        </details>
    </div>
<a href="index.html" class="floating-home-btn">
    <img src="cancel.png" alt="back">
</a>
</body>
</html>
